name: Test

on:
  push:
    branches: ["**"]
    paths:
      - "extension/lib.js"
  pull_request:
    branches: ["**"]
    paths:
      - "extension/lib.js"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Run tests
        run: node test.mjs
